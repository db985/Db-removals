kind = "web"
previewPath = "/"
title = "House Removals Website"
version = "1.0.0"
id = "artifacts/removals-site"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20444

[services.development]
run = "pnpm --filter @workspace/removals-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/removals-site", "run", "build" ]
serve = "static"
publicDir = "artifacts/removals-site/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20444"
BASE_PATH = "/"
